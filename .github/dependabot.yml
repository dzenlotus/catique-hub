# Catique HUB — Dependabot configuration
#
# Weekly cadence keeps the upgrade noise manageable for a sole-maintainer
# project (D-001) while still flagging security advisories within ~7 days.
# Minor + patch updates are grouped per ecosystem so a single PR per week
# handles the routine bumps; major bumps come as individual PRs because
# they typically need release-note review.
#
# License-allowlist is enforced separately in CI (`ci.yml` audit job) —
# Dependabot itself does not understand SPDX policy, so a bumped dep that
# changes license under us would still get caught at merge time.

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - npm

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - rust

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(ci)"
      include: scope
    labels:
      - dependencies
      - github-actions
