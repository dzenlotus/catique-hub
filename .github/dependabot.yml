# Catique HUB — Dependabot configuration
#
# Weekly cadence keeps the upgrade noise manageable for a sole-maintainer
# project (D-001) while still flagging security advisories within ~7 days.
# Minor + patch updates are grouped per ecosystem so a single PR per week
# handles the routine bumps; major bumps come as individual PRs because
# they typically need release-note review.
#
# License-allowlist is enforced separately in CI (`ci.yml` audit job) —
# Dependabot itself does not understand SPDX policy, so a bumped dep that
# changes license under us would still get caught at merge time.

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - npm

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    # Exact-pinned crates (anything touching the IPC or storage protocol —
    # see [workspace.dependencies] in Cargo.toml) are bumped deliberately
    # by hand, with regenerated bindings/ committed in the same PR.
    # Dependabot bumps for these only create un-mergeable noise.
    ignore:
      - dependency-name: serde
      - dependency-name: serde_json
      - dependency-name: ts-rs
      - dependency-name: rusqlite
      - dependency-name: r2d2
      - dependency-name: r2d2_sqlite
      - dependency-name: include_dir
      - dependency-name: nanoid
      - dependency-name: sha2
    groups:
      cargo-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - rust

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(ci)"
      include: scope
    labels:
      - dependencies
      - github-actions
