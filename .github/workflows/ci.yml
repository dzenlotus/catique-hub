# Catique HUB — Continuous Integration
#
# Runs on every push and pull_request targeting `main`. Matrix is
# ubuntu-24.04 only by design: macOS and Windows runners are 10x more
# expensive minute-for-minute (mac) and slower (win), and both Rust
# clippy/test and pnpm build behave identically across OSes for our
# stack. Cross-platform packaging is exercised in `build.yml` /
# `release.yml` where we actually need .dmg / .msi artifacts.
#
# Action versions are pinned at major (@v4 etc) per dependency-discipline
# §CI: CI is more flexible than runtime deps (we get the latest patches
# with no SemVer-breaking risk for first-party GitHub-maintained actions).
# Exception: Swatinem/rust-cache is pinned to a specific tag because its
# cache-key algorithm has changed across minor versions and we want
# reproducible cache hits.
#
# Coverage gate (NFR §5.1): 75% branches at E1. Documented but NOT yet
# enforced — wiring in tarpaulin/vitest-coverage uploads is E2 work; for
# now we run tests so they fail fast on regression. The lint job will
# become a hard coverage gate in E2.
#
# License-allowlist (NFR §6): we run `cargo tree | grep -i 'agpl\|sspl'`
# in the audit job and fail on any match. `cargo deny` proper is E2 too;
# the grep is a cheap stop-gap that catches the two licenses we care most
# about (AGPL, SSPL — both incompatible with Elastic-2.0 per NFR §6.1).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same ref when a new push lands — saves CI
# minutes during rapid iteration on PRs without losing the most recent
# result.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default minimum-privilege token — we only need to read the repo.
# Individual jobs may widen this if/when needed (none do today).
permissions:
  contents: read

jobs:
  lint-frontend:
    name: Frontend (lint, type-check, test)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Test
        # `--run` ensures Vitest exits after a single pass instead of
        # entering watch mode on CI. If the project does not yet have
        # tests (E1 frontend is mostly Tauri scaffold) the script will
        # exit 0 — that's intentional, we don't want to gate E1 on a
        # test suite that hasn't been written yet.
        run: pnpm test --run --if-present || pnpm exec vitest run --passWithNoTests

      - name: Upload coverage (if produced)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  lint-rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps for Tauri
        # Tauri's tao/wry crates link against gtk + webkit2gtk + libsoup
        # on Linux, even when we only build the workspace (the api crate
        # does not pull tauri runtime, but src-tauri does). Cheap one-time
        # apt install.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2.7.3
        with:
          # Workspace-aware cache key derived from Cargo.lock; bumps
          # automatically when deps change.
          workspaces: ". -> target"
          shared-key: catique-hub-ci

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # -D warnings = treat any warning as error. NFR §5.2 requires
        # clippy::all denied across the workspace; pedantic comes online
        # in E2 (see crate-level #![deny(clippy::pedantic)] migration
        # tracked in Olga's E1.2 task).
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

      # Coverage is intentionally NOT wired here for E1.
      # NFR §5.1 sets the gate at 75% branches; tarpaulin/llvm-cov
      # integration is on the E2 backlog. Documenting the gap rather
      # than silently shipping unmeasured code.

  audit:
    name: Security & license audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (production deps, fail on high)
        # Continue-on-error not set — high-severity advisories should
        # block the merge. Dev-deps audit is too noisy at this stage.
        run: pnpm audit --prod --audit-level high

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2.7.3
        with:
          workspaces: ". -> target"
          shared-key: catique-hub-audit

      - name: License allowlist check (AGPL/SSPL forbidden — NFR §6.1)
        # NFR §6.1 forbids AGPL-3.0 and SSPL-1.0 — both incompatible with
        # the Elastic-2.0 license we ship under. `cargo tree` is the
        # cheapest authoritative source; full `cargo deny` integration
        # arrives in E2 with a proper allow-list config. Until then we
        # explicitly fail the job if either string appears anywhere in
        # the rendered tree.
        run: |
          set -euo pipefail
          cargo tree --workspace --format "{p} {l}" --prefix none > deps.txt
          if grep -E -i 'AGPL|SSPL' deps.txt; then
            echo "::error::Dependency under AGPL/SSPL detected — incompatible with Elastic-2.0 (NFR §6.1)."
            exit 1
          fi
          echo "License scan passed: no AGPL/SSPL dependency detected."
