# Catique HUB — Cross-platform installer build
#
# Triggered manually (workflow_dispatch) for ad-hoc dev artifacts and
# automatically on `v*` tags as part of the release flow (release.yml
# calls this workflow as a reusable job — see `workflow_call` below).
#
# Matrix:
#   - macos-14    : Apple silicon runner, builds aarch64 .dmg
#   - windows-2025: x86_64 .msi
#
# Code signing is staged: each platform has a conditional codesign step
# that no-ops with a loud warning when the relevant secret is unset
# (Wave 0 procurement memo `code-signing-procurement.md` documents the
# secret names; until dzenlotus runs `gh secret set` the artifacts ship
# unsigned for development purposes only).
#
# Secret rotation runbook: `docs/release-runbook.md` in this repo.

name: Build installers

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are we building? (free text, shows in run summary)"
        required: false
        default: "manual dev build"
  push:
    tags:
      - "v*"
  workflow_call:
    # Reusable variant for release.yml. No inputs needed — release.yml
    # invokes this on the same tag commit it was triggered by.
    inputs:
      tag:
        description: "Tag being built (release.yml passes github.ref_name)"
        type: string
        required: false

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact-name: catique-hub-macos-arm64
            artifact-glob: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            artifact-name: catique-hub-windows-x64
            artifact-glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: ". -> target"
          shared-key: catique-hub-build-${{ matrix.os }}

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      # ----- macOS code-signing & notarization (conditional) -----
      # Secret names match the Wave 0 procurement memo:
      #   APPLE_CERT_BASE64       — base64 of Developer-ID-Application.p12
      #   APPLE_CERT_PASSWORD     — .p12 export password
      #   APPLE_TEAM_ID           — 10-char alphanumeric team identifier
      #   APPLE_API_KEY_ID        — App Store Connect API key id (10 char)
      #   APPLE_API_ISSUER_ID     — App Store Connect issuer UUID
      #   APPLE_API_KEY_BASE64    — base64 of AuthKey_XXXXX.p8
      - name: Import Apple signing identity (macOS only)
        if: matrix.os == 'macos-14' && env.APPLE_CERT_BASE64 != ''
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$APPLE_CERT_BASE64" | base64 --decode > /tmp/apple-cert.p12
          security create-keychain -p actions ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p actions ci.keychain
          security set-keychain-settings -lut 21600 ci.keychain
          security import /tmp/apple-cert.p12 \
            -k ci.keychain -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions ci.keychain
          rm /tmp/apple-cert.p12
          echo "Apple signing identity imported into ci.keychain."

      - name: Warn on unsigned macOS build
        if: matrix.os == 'macos-14' && env.APPLE_CERT_BASE64 == ''
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
        run: |
          echo "::warning::APPLE_CERT_BASE64 not configured — producing an UNSIGNED .dmg. The signing pipeline activates as soon as dzenlotus runs `gh secret set` for the Apple secrets listed in docs/release-runbook.md."

      # ----- Windows code-signing (conditional) -----
      # Secret names per Wave 0 memo (SSL.com EV via eSigner cloud HSM):
      #   WINDOWS_CERT_BASE64           — placeholder; SSL.com cloud-HSM
      #                                   workflow does NOT need a local
      #                                   .p12 (kept for symmetry / future
      #                                   on-prem fallback). When set,
      #                                   build switches to local signtool.
      #   WINDOWS_CERT_PASSWORD         — same caveat
      #   WINDOWS_SSLCOM_USERNAME       — SSL.com account email
      #   WINDOWS_SSLCOM_PASSWORD       — SSL.com account password
      #   WINDOWS_SSLCOM_CREDENTIAL_ID  — eSigner credential identifier
      #   WINDOWS_SSLCOM_TOTP_SECRET    — TOTP seed for cloud HSM auth
      - name: Sign Windows artifacts (eSigner cloud HSM)
        if: matrix.os == 'windows-2025' && env.WINDOWS_SSLCOM_USERNAME != ''
        env:
          WINDOWS_SSLCOM_USERNAME: ${{ secrets.WINDOWS_SSLCOM_USERNAME }}
          WINDOWS_SSLCOM_PASSWORD: ${{ secrets.WINDOWS_SSLCOM_PASSWORD }}
          WINDOWS_SSLCOM_CREDENTIAL_ID: ${{ secrets.WINDOWS_SSLCOM_CREDENTIAL_ID }}
          WINDOWS_SSLCOM_TOTP_SECRET: ${{ secrets.WINDOWS_SSLCOM_TOTP_SECRET }}
        shell: pwsh
        run: |
          # Real eSigner CLI invocation lands in E6 (release-runbook
          # documents the exact command). For now we no-op with an
          # acknowledgement so the conditional branch is exercised end-
          # to-end when secrets first arrive.
          Write-Host "Cloud HSM signing path will run here once SSL.com cert is delivered (E6)."

      - name: Warn on unsigned Windows build
        if: matrix.os == 'windows-2025' && env.WINDOWS_SSLCOM_USERNAME == ''
        env:
          WINDOWS_SSLCOM_USERNAME: ${{ secrets.WINDOWS_SSLCOM_USERNAME }}
        shell: pwsh
        run: |
          Write-Host "::warning::WINDOWS_SSLCOM_USERNAME not configured — producing an UNSIGNED .msi. The eSigner pipeline activates once dzenlotus runs `gh secret set` for the SSL.com secrets listed in docs/release-runbook.md."

      # ----- Tauri build (always runs) -----
      - name: Tauri build (macOS aarch64)
        if: matrix.os == 'macos-14'
        env:
          # When secrets are present, tauri-bundler picks them up natively
          # and signs in-line. When unset, these env vars are empty and
          # tauri-bundler falls back to an unsigned bundle.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Tauri build (Windows x86_64)
        if: matrix.os == 'windows-2025'
        run: pnpm tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 14
